<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <div th:replace="~{layout/base :: sidebar}" th:with="activePage='library'"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Library</h1>
            </div>
        </div>
        <div class="content">
            <div class="container-fluid">
                <a th:href="@{/library/new}" class="btn btn-primary mb-3">
                    <i class="fas fa-plus"></i> Add Book
                </a>
                <div class="card">
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover text-nowrap">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>ISBN</th>
                                <th>Category</th>
                                <th>Total</th>
                                <th>Available</th>
                                <th>Added Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="book : ${books}">
                                <td th:text="${book.id}"></td>
                                <td th:text="${book.title}"></td>
                                <td th:text="${book.author}"></td>
                                <td th:text="${book.isbn}"></td>
                                <td th:text="${book.category}"></td>
                                <td th:text="${book.totalCopies}"></td>
                                <td th:text="${book.availableCopies}"></td>
                                <td th:text="${book.addedDate}"></td>
                                <td>
                                        <span class="badge"
                                              th:classappend="${book.status.name() == 'AVAILABLE'} ? 'badge-success' : (${book.status.name() == 'ISSUED'} ? 'badge-warning' : 'badge-danger')"
                                              th:text="${book.status}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/library/edit/{id}(id=${book.id})}" class="btn btn-sm btn-warning">Edit</a>
                                    <a th:href="@{/library/delete/{id}(id=${book.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Delete this book?')">Delete</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(books)}">
                                <td colspan="10" class="text-center text-muted">No books found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <strong>College ERP</strong> &copy; 2026. All rights reserved.
    </footer>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/adminlte.min.js}"></script>
</body>
</html>
