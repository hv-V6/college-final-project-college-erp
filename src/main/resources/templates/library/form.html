<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <div th:replace="~{layout/base :: sidebar}" th:with="activePage='library'"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0" th:text="${book.id == null} ? 'Add Book' : 'Edit Book'"></h1>
            </div>
        </div>
        <div class="content">
            <div class="container-fluid">
                <div class="card card-primary" style="max-width:600px;">
                    <div class="card-body">
                        <form th:action="@{/library/save}" th:object="${book}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="form-group">
                                <label>Title</label>
                                <input type="text" class="form-control" th:field="*{title}"
                                       placeholder="Book title" required>
                            </div>

                            <div class="form-group">
                                <label>Author</label>
                                <input type="text" class="form-control" th:field="*{author}"
                                       placeholder="Author name" required>
                            </div>

                            <div class="form-group">
                                <label>ISBN</label>
                                <input type="text" class="form-control" th:field="*{isbn}"
                                       placeholder="e.g. 978-3-16-148410-0">
                            </div>

                            <div class="form-group">
                                <label>Category</label>
                                <input type="text" class="form-control" th:field="*{category}"
                                       placeholder="e.g. Science, Literature, Engineering">
                            </div>

                            <div class="form-group">
                                <label>Total Copies</label>
                                <input type="number" class="form-control" th:field="*{totalCopies}"
                                       min="1" required>
                            </div>

                            <div class="form-group">
                                <label>Available Copies</label>
                                <input type="number" class="form-control" th:field="*{availableCopies}"
                                       min="0" required>
                            </div>

                            <div class="form-group">
                                <label>Added Date</label>
                                <input type="date" class="form-control" th:field="*{addedDate}">
                            </div>

                            <div class="form-group">
                                <label>Status</label>
                                <select class="form-control" th:field="*{status}" required>
                                    <option value="">-- Select Status --</option>
                                    <option th:each="s : ${bookStatuses}"
                                            th:value="${s}"
                                            th:text="${s}">
                                    </option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/library}" class="btn btn-secondary ml-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <strong>College ERP</strong> &copy; 2026. All rights reserved.
    </footer>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/adminlte.min.js}"></script>
</body>
</html>
