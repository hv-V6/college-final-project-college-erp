<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <div th:replace="~{layout/base :: sidebar}" th:with="activePage='fees'"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Fee Management</h1>
            </div>
        </div>
        <div class="content">
            <div class="container-fluid">
                <a th:href="@{/fees/new}" class="btn btn-primary mb-3">
                    <i class="fas fa-plus"></i> Add Fee Record
                </a>
                <div class="card">
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover text-nowrap">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Student</th>
                                <th>Fee Type</th>
                                <th>Amount (₹)</th>
                                <th>Due Date</th>
                                <th>Paid Date</th>
                                <th>Status</th>
                                <th>Remarks</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="fee : ${fees}">
                                <td th:text="${fee.id}"></td>
                                <td th:text="${fee.student.firstName + ' ' + fee.student.lastName}"></td>
                                <td th:text="${fee.feeType}"></td>
                                <td th:text="${fee.amount}"></td>
                                <td th:text="${fee.dueDate}"></td>
                                <td th:text="${fee.paidDate}"></td>
                                <td>
                                        <span class="badge"
                                              th:classappend="${fee.status.name() == 'PAID'} ? 'badge-success' : (${fee.status.name() == 'UNPAID'} ? 'badge-danger' : 'badge-warning')"
                                              th:text="${fee.status}"></span>
                                </td>
                                <td th:text="${fee.remarks}"></td>
                                <td>
                                    <a th:href="@{/fees/edit/{id}(id=${fee.id})}" class="btn btn-sm btn-warning">Edit</a>
                                    <a th:href="@{/fees/delete/{id}(id=${fee.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Delete this record?')">Delete</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(fees)}">
                                <td colspan="9" class="text-center text-muted">No fee records found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <strong>College ERP</strong> &copy; 2026. All rights reserved.
    </footer>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/adminlte.min.js}"></script>
</body>
</html>
