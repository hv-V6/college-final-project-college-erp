<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <div th:replace="~{layout/base :: sidebar}" th:with="activePage='exams'"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Exams &amp; Results</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Home</a></li>
                            <li class="breadcrumb-item active">Exams &amp; Results</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Exam Results</h3>
                        <div class="card-tools">
                            <a th:href="@{/exams/new}" class="btn btn-primary btn-sm">
                                <i class="fas fa-plus"></i> Add Result
                            </a>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered table-striped">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Student</th>
                                <th>Exam Name</th>
                                <th>Subject</th>
                                <th>Department</th>
                                <th>Date</th>
                                <th>Marks</th>
                                <th>Grade</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="e, stat : ${examList}">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${e.student != null ? e.student.firstName + ' ' + e.student.lastName : 'N/A'}"></td>
                                <td th:text="${e.examName}"></td>
                                <td th:text="${e.subject}"></td>
                                <td th:text="${e.department}"></td>
                                <td th:text="${e.examDate}"></td>
                                <td th:text="${e.marksObtained + ' / ' + e.totalMarks}"></td>
                                <td>
                                        <span th:text="${e.grade}"
                                              th:classappend="${e.grade == 'A' or e.grade == 'A+'} ? 'badge badge-success' :
                                                             (${e.grade == 'F'} ? 'badge badge-danger' : 'badge badge-info')">
                                        </span>
                                </td>
                                <td>
                                    <a th:href="@{/exams/edit/{id}(id=${e.id})}" class="btn btn-warning btn-sm">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/exams/delete/{id}(id=${e.id})}" class="btn btn-danger btn-sm"
                                       onclick="return confirm('Delete this result?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(examList)}">
                                <td colspan="9" class="text-center">No exam results found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer">
        <strong>College ERP</strong> &copy; 2026. All rights reserved.
    </footer>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/adminlte.min.js}"></script>
</body>
</html>
