<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <div th:replace="~{layout/base :: sidebar}" th:with="activePage='timetable'"></div>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0" th:text="${entry.id == null} ? 'Add Timetable Entry' : 'Edit Timetable Entry'"></h1>
            </div>
        </div>
        <div class="content">
            <div class="container-fluid">
                <div class="card card-primary" style="max-width:600px;">
                    <div class="card-body">
                        <form th:action="@{/timetable/save}" th:object="${entry}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="form-group">
                                <label>Department</label>
                                <input type="text" class="form-control" th:field="*{department}"
                                       placeholder="e.g. Computer Science" required>
                            </div>

                            <div class="form-group">
                                <label>Day of Week</label>
                                <select class="form-control" th:field="*{dayOfWeek}" required>
                                    <option value="">-- Select Day --</option>
                                    <option th:each="day : ${days}"
                                            th:value="${day}"
                                            th:text="${day}">
                                    </option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Subject</label>
                                <input type="text" class="form-control" th:field="*{subject}"
                                       placeholder="e.g. Data Structures" required>
                            </div>

                            <div class="form-group">
                                <label>Faculty Name</label>
                                <input type="text" class="form-control" th:field="*{facultyName}"
                                       placeholder="e.g. Dr. Sharma" required>
                            </div>

                            <div class="form-group">
                                <label>Start Time</label>
                                <input type="time" class="form-control" th:field="*{startTime}" required>
                            </div>

                            <div class="form-group">
                                <label>End Time</label>
                                <input type="time" class="form-control" th:field="*{endTime}" required>
                            </div>

                            <div class="form-group">
                                <label>Room</label>
                                <input type="text" class="form-control" th:field="*{room}"
                                       placeholder="e.g. Room 301" required>
                            </div>

                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/timetable}" class="btn btn-secondary ml-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <strong>College ERP</strong> &copy; 2026. All rights reserved.
    </footer>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/adminlte.min.js}"></script>
</body>
</html>
